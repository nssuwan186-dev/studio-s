name: Build VIPAT APK v4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Install dependencies
        run: npm install

      - name: Download JS bundles
        run: |
          curl -sL https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js -o www/js/moment.min.js
          curl -sL https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/th.min.js -o www/js/moment-th.min.js

      - name: Setup Capacitor
        run: |
          npx cap add android
          npx cap sync android

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: vipat-hotel-v4-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
