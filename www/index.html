<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>รีสอร์ท สวีท</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Capacitor Core -->
    <script type="module" src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>🏨 รีสอร์ท สวีท</h1>
            <p>ระบบจัดการห้องพัก</p>
        </header>
        
        <main class="app-main">
            <section class="room-list" id="roomList">
                <h2>สถานะห้องพัก</h2>
                <div class="rooms-container" id="roomsContainer">
                    <!-- ห้องพักจะถูกโหลดที่นี่ -->
                </div>
            </section>
            
            <section class="add-room">
                <h2>เพิ่มห้องพัก</h2>
                <form id="addRoomForm">
                    <input type="text" id="roomNumber" placeholder="เลขห้อง" required>
                    <select id="roomType">
                        <option value="standard">Standard</option>
                        <option value="deluxe">Deluxe</option>
                        <option value="suite">Suite</option>
                    </select>
                    <button type="submit">เพิ่มห้อง</button>
                </form>
            </section>
        </main>
        
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="rooms">ห้องพัก</button>
            <button class="nav-btn" data-page="guests">ผู้เข้าพัก</button>
            <button class="nav-btn" data-page="settings">ตั้งค่า</button>
        </nav>
    </div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
