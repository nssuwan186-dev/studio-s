name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Delete old releases
        run: |
          for tag in $(git tag -l "build-*" 2>/dev/null); do
            gh release delete "$tag" --yes 2>/dev/null || true
            git tag -d "$tag" 2>/dev/null || true
          done
          for tag in $(git tag -l "sha-*" 2>/dev/null); do
            gh release delete "$tag" --yes 2>/dev/null || true
            git tag -d "$tag" 2>/dev/null || true
          done
          git push origin :refs/tags/build-* 2>/dev/null || true
          git push origin :refs/tags/sha-* 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Release $TAG (v4.1.0)" \
            --notes "Auto build - Version 4.1.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
