name: Build APK
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Create release v4.1.0
        run: |
          gh release delete v4.1.0 --yes 2>/dev/null || true
          gh release create v4.1.0 \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "VIPAT Hotel v4.1.0" \
            --notes "Release v4.1.0 - Stable Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
