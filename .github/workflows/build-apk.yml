name: Build APK
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Delete ALL old releases on GitHub
        run: |
          for release in $(gh release list --repo nssuwan186-dev/studio-s --limit 100 --json tagName -q '.[].tagName' 2>/dev/null); do
            echo "Deleting release: $release"
            gh release delete "$release" --yes 2>/dev/null || true
          done
          for tag in $(git tag -l 2>/dev/null); do
            git tag -d "$tag" 2>/dev/null || true
          done
          git push origin --tags 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Create release v4.1.0
        run: |
          gh release create v4.1.0 \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "VIPAT Hotel v4.1.0" \
            --notes "Release v4.1.0 - Stable Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
