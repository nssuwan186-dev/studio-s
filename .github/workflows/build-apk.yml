name: Build APK
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Delete ALL old releases first
        run: |
          for tag in $(git tag -l 2>/dev/null); do
            gh release delete "$tag" --yes 2>/dev/null || true
            git tag -d "$tag" 2>/dev/null || true
          done
          git push origin --delete $(git tag -l 2>/dev/null) 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        run: |
          TAG="v4.1.0"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "VIPAT Hotel v4.1.0" \
            --notes "Release v4.1.0 - Stable Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
